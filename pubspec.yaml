name: reducer
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.1+2
environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  flutter_launcher_icons: ^0.14.4
  # Navigation
  go_router: ^16.1.0

  # Image Processing
  image: ^4.7.2
  image_picker: ^1.2.1
  flutter_image_compress: ^2.3.0
  file_picker: ^10.3.10
  path_provider: ^2.1.5
  path: ^1.9.0

  # UI & Animations
  lottie: ^3.3.2
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.1
  shimmer: ^3.0.0
  iconsax: ^0.0.8

  # Services & Utilities
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  share_plus: ^12.0.1
  gal: ^2.3.2
  archive: ^4.0.7
  connectivity_plus: ^6.1.3
  uuid: ^4.5.1

  # Monetization
  google_mobile_ads: ^7.0.0
  in_app_purchase: ^3.2.3
  
  # Firebase
  firebase_core: ^4.4.0
  # firebase_remote_config: ^6.1.4   # unused, remove for size saving
  # firebase_analytics: ^12.1.2      # unused, remove for size saving

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.6.5
  build_runner: 2.4.14
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  alchemist: ^0.8.0
  patrol: ^3.7.0
  
flutter:

  uses-material-design: true
  assets:
     - assets/logo/
     - assets/premium_screen/
     - assets/common/
flutter_launcher_icons:
  android: "launcher_icon"  # Or true to overwrite adaptive icons
  ios: true
  image_path: "assets/logo/reducer_logo.jpg"  # Path to your 1024x1024 PNG image
